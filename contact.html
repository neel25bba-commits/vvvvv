<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Neel Travels</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:linear-gradient(135deg,#0d0d0d,#1a1a1a);
    color:white;
}

/* NAVBAR */
header{
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
    transition:0.3s;
}

header.scrolled{
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(10px);
}

nav{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
}

nav h1{
    color:gold;
    font-family:'Playfair Display', serif;
}

nav ul{
    display:flex;
    gap:25px;
    list-style:none;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

nav ul li a:hover{
    color:gold;
}

/* SECTION */
.contact-section{
    padding:120px 60px 60px;
    display:flex;
    flex-wrap:wrap;
    gap:50px;
    justify-content:center;
}

/* FORM */
.contact-form{
    flex:1;
    min-width:300px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:15px;
}

.contact-form h2{
    color:gold;
    margin-bottom:20px;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    background:#1a1a1a;
    color:white;
    border-radius:8px;
}

.contact-form input:focus,
.contact-form textarea:focus{
    outline:none;
    box-shadow:0 0 10px gold;
}

/* BUTTON */
.btn{
    padding:12px 25px;
    background:gold;
    border:none;
    cursor:pointer;
    border-radius:20px;
}

/* INFO */
.contact-info{
    flex:1;
    min-width:300px;
}

.contact-info h3{
    color:gold;
    margin-bottom:15px;
}

.contact-info a{
    color:#ccc;
    text-decoration:none;
}

.contact-info a:hover{
    color:gold;
}

/* MAP */
.map{
    display:none;
    margin-top:20px;
}

iframe{
    width:100%;
    height:250px;
    border:0;
}

/* SUCCESS MESSAGE */
.success{
    position:fixed;
    top:20px;
    right:20px;
    background:green;
    padding:15px 25px;
    display:none;
}

/* FOOTER */
footer{
    text-align:center;
    padding:25px;
    background:black;
}
</style>
</head>

<body>

<header id="navbar">
<nav>
    <h1>Neel Travels</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="destinations.html">Destinations</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>
</header>

<section class="contact-section">

<!-- FORM -->
<div class="contact-form">
    <h2>Get In Touch</h2>

    <form onsubmit="handleSubmit(event)">
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Your Email">
        <textarea id="message" rows="5" placeholder="Your Message"></textarea>
        <button class="btn">Send Message</button>
    </form>
</div>

<!-- INFO -->
<div class="contact-info">
    <h3>Contact Information</h3>
    <p>Email: <a href="mailto:neeltravels@gmail.com">contact@neeltravels.com</a></p>
    <p>Phone: <a href="tel:+9198765XXXXX">+91 98765 XXXXX</a></p>
    <p>Address: India</p>

    <button class="btn" onclick="toggleMap()">Show Map</button>

    <div class="map" id="map">
        <iframe src="https://maps.google.com/maps?q=india&t=&z=5&output=embed"></iframe>
    </div>
</div>

</section>

<div class="success" id="successMsg">Message Sent Successfully!</div>

<footer>
© 2026 Neel Travels
</footer>

<script>

// Navbar scroll
window.addEventListener("scroll",()=>{
    navbar.classList.toggle("scrolled",window.scrollY>50);
});

// Form validation
function handleSubmit(e){
    e.preventDefault();

    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let message=document.getElementById("message").value;

    if(name==="" || email==="" || message===""){
        alert("Please fill all fields!");
        return;
    }

    // Success message
    let msg=document.getElementById("successMsg");
    msg.style.display="block";

    setTimeout(()=>{msg.style.display="none";},3000);

    e.target.reset();
}

// Toggle map
function toggleMap(){
    let map=document.getElementById("map");
    map.style.display = map.style.display==="block" ? "none" : "block";
}

</script>

</body>
</html>
